monolog:
    handlers:
        main:
            type: fingers_crossed
            action_level: error
            handler: nested
            excluded_http_codes: [404, 405]
            buffer_size: 50 # How many messages should be saved? Prevent memory leaks
        nested:
            type: stream
            path: "%kernel.logs_dir%/%kernel.environment%.log"
            level: debug
        console:
            type: console
            process_psr_3_messages: false
            channels: ["!event", "!doctrine"]
        # toggle handled by \App\DependencyInjection\Compiler\ToggleLokiHandlerPass
        # remember to keep the pass up to date when changing any loki service definitions
        loki_filtered:
            type: service
            id: monolog.handler.loki_healthcheck_filter
            level: '%app.log.loki.log_level%'
            channels: [ "app", "php", "request", "http_client", "console" ]
